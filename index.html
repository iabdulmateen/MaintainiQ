<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MaintainIQ - AI-Powered QR Maintenance & Asset History</title>
  <link rel="stylesheet" href="./styles.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>

  <div class="demo-control-bar" id="demo-control-bar">
    <div class="demo-title">
      <i data-lucide="cpu"></i>
      MaintainIQ Demo Console
    </div>
    <div class="demo-roles">
      <span style="font-size: 0.75rem; color: var(--text-muted); align-self: center; margin-right: 8px;">Active Persona:</span>
      <button class="role-btn active" data-role="admin">Admin</button>
      <button class="role-btn" data-role="technician">Technician</button>
      <button class="role-btn" data-role="public">Public / Reporter</button>
    </div>
  </div>

  <div class="app-container">
    <aside class="app-sidebar" id="app-sidebar">
      <div class="app-logo">
        <i data-lucide="shield-check" style="stroke: var(--primary); stroke-width: 2.5;"></i>
        <span>MaintainIQ</span>
      </div>
      
      <nav style="flex: 1;">
        <ul class="nav-menu" id="nav-menu">
          <li class="nav-item active" id="nav-dashboard">
            <a href="#/">
              <i data-lucide="layout-dashboard"></i>
              <span>Dashboard</span>
            </a>
          </li>
          <li class="nav-item" id="nav-assets">
            <a href="#/assets">
              <i data-lucide="package"></i>
              <span>Assets</span>
            </a>
          </li>
          <li class="nav-item" id="nav-issues">
            <a href="#/issues">
              <i data-lucide="wrench"></i>
              <span>Issues</span>
            </a>
          </li>
          <li class="nav-item admin-only" id="nav-settings">
            <a href="#/settings">
              <i data-lucide="settings"></i>
              <span>Settings</span>
            </a>
          </li>
        </ul>
      </nav>
      <div class="sidebar-footer">
        <div class="user-badge">
          <div class="user-avatar" id="user-avatar">A</div>
          <div class="user-info">
            <div class="user-name" id="user-name">System Administrator</div>
            <div class="user-role" id="user-role">Full Access</div>
          </div>
        </div>
      </div>
    </aside>

    <main class="app-content">
      <header class="app-header">
        <h1 class="page-title" id="page-title">Dashboard</h1>
        <div class="header-actions" id="header-actions">
        </div>
      </header>
      <div class="view-container" id="view-container">
      </div>
    </main>
  </div>

  <div class="modal-backdrop" id="modal-backdrop">
    <div class="modal-container" id="modal-container">
    </div>
  </div>
  
  <script type="module" src="app.js"></script>
</body>
</html>
